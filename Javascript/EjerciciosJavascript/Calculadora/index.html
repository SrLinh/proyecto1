<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
</head>
<body>
     <textarea type="text" id = "visor"></textarea  >
    <div id = "buttomValue">
        <button id = "button1" value = "1">1</button>
        <button id = "button2" value = "2">2</button>
        <button id = "button3" value = "3">3</button>
        <br>
        <button id = "button4" value = "4">4</button>
        <button id = "button5" value = "5">5</button>
        <button id = "button6" value = "6">6</button>
        <br>
        <button id = "button7" value = "7">7</button>
        <button id = "button8" value = "8">8</button>
        <button id = "button9" value = "9">9</button>
        <br>
        <button id = "button0" value = "0">0</button>
        <button id = "buttonDecimal"  value = ".">.</button>
    </div>
    <div id = "buttonOperations">
        <button id = "buttonSum"  value = "+">+</button>
        <button id = "buttonRest"  value = "-">-</button>
        <button id = "buttonMult"  value = "*">*</button>
        <button id = "buttonDiv"  value = "/">/</button>
        <br>
    </div>
    <div id = "buttonFeatures">
        <button id = "buttonResult"  value = "=">=</button>
        <button id = "buttonCE"  value = "CE">CE</button>
        <button id = "buttonDel"  value = "Del">Del</button>
    </div>

    
</body>
</html>
<script src="js/scripst.js"></script>
